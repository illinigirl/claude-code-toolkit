name: test
on:
  push:
  pull_request:

# Validates the scaffold-mcp skill end-to-end: generate a project, then prove the
# generated repo installs, lints, and tests clean.
jobs:
  scaffold-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Scaffold a project
        run: python3 skills/scaffold-mcp/scaffold.py --name ci-demo --domain widget --dest /tmp
      - name: Install + lint + test the generated project
        working-directory: /tmp/ci-demo
        run: |
          pip install -e ".[test]" ruff
          ruff check .
          python -m pytest -q
      - name: Non-editable install finds the packaged seed
        # The regression this guards: a seed resolved relative to __file__ works
        # in a src-layout checkout but breaks once the module lands in
        # site-packages. Editable installs alone can never catch it.
        working-directory: /tmp
        run: |
          pip uninstall -y -q ci-demo
          pip install -q ./ci-demo
          python -m cidemo.cli summary

  book-tracker-example:
    runs-on: ubuntu-latest
    # The worked example the scaffold-mcp demo path ships. Prove it installs,
    # lints, tests, and that the headline demo tool call actually produces output.
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install + lint + test the worked example
        working-directory: skills/scaffold-mcp/examples/book-tracker
        run: |
          pip install -e ".[test]" ruff
          ruff check .
          python -m pytest -q
      - name: Drive the demo (the headline tool call must produce output)
        working-directory: skills/scaffold-mcp/examples/book-tracker
        run: |
          out=$(PYTHONPATH=src python -m booktracker.cli top-genres)
          echo "$out"
          echo "$out" | grep -q "Fantasy"
      - name: Non-editable install finds the packaged seed
        run: |
          pip uninstall -y -q book-tracker
          pip install -q ./skills/scaffold-mcp/examples/book-tracker
          cd /tmp && python -m booktracker.cli top-genres | grep -q "Fantasy"

  failure-modes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Hook regression test
        run: python3 failure-modes/test_hook.py
      - name: Context-alert hook regression test
        run: python3 context-alert/test_hook.py
      - name: Coverage-nudge hook regression test
        run: python3 coverage-nudge/test_hook.py
      - name: Subagent-nudge hook regression test
        run: python3 subagent-nudge/test_hook.py
      - name: CLAUDE.md curator hook regression test
        run: python3 claude-md-curator/test_hook.py
      - name: Memory curator hook regression test
        run: python3 memory-curator/test_hook.py
      - name: Enforcement-redundancy nudge hook regression test
        run: python3 enforcement-nudge/test_hook.py
      - name: Coverage-audit checklist validator test
        run: python3 skills/coverage-audit/test_checklist.py
      - name: Manifests are valid JSON
        run: |
          python3 -m json.tool .claude-plugin/plugin.json     > /dev/null
          python3 -m json.tool .claude-plugin/marketplace.json > /dev/null
          python3 -m json.tool hooks/hooks.json               > /dev/null
      - name: SKILL.md frontmatter is valid YAML
        # GitHub won't render frontmatter that isn't valid YAML (e.g. an
        # unquoted argument-hint starting with "[" parses as a flow sequence).
        run: |
          pip install pyyaml
          python3 -c "import yaml,glob; [yaml.safe_load(open(f).read().split('---')[1]) for f in sorted(glob.glob('skills/*/SKILL.md'))]; print('frontmatter OK')"
