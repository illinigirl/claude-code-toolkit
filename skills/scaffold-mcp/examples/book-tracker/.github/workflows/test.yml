name: test
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[test]" ruff
      - name: Lint
        run: ruff check .
      - name: Test
        run: python -m pytest -q
      - name: Non-editable install finds the packaged seed
        # Editable installs run from the checkout, so they'd never catch a seed
        # path that breaks once the module lands in site-packages.
        run: |
          pip uninstall -y -q book-tracker
          pip install -q .
          cd /tmp && python -m booktracker.cli summary
